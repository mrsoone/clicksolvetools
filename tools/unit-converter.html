<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #74ebd5, #acb6e5);
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 900px;
            background: white;
            padding: 70px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            text-align: center;
        }
        h2 {
            margin-bottom: 15px;
            color: #333;
        }
        select, input, button {
            display: block;
            width: 100%;
            margin: 10px 0;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 26px;
        }
        button {
            background: #4CAF50;
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: #45a049;
        }
        .result {
            margin-top: 20px;
            font-size: 2.2em;
            font-weight: bold;
            color: #444;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Unit Converter</h2>
        <input type="number" id="inputValue" placeholder="Enter value" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 22px; box-sizing: border-box;">
        <select id="unitType">
            <option value="length">Length</option>
            <option value="weight">Weight</option>
            <option value="temperature">Temperature</option>
        </select>
        <select id="fromUnit"></select>
        <select id="toUnit"></select>
        <button onclick="convertUnit()">Convert</button>
        <div class="result" id="result"></div>
    </div>
    <script>
        const unitOptions = {
            length: { "Meters": 1, "Kilometers": 0.001, "Miles": 0.000621371, "Feet": 3.28084, "Inches": 39.3701, "Centimeters": 100, "Millimeters": 1000 },
            weight: { "Grams": 1, "Kilograms": 0.001, "Pounds": 0.00220462, "Ounces": 0.035274 },
            temperature: { "Celsius": "C", "Fahrenheit": "F", "Kelvin": "K" }
        };

        function populateUnits() {
            const unitType = document.getElementById("unitType").value;
            const fromUnit = document.getElementById("fromUnit");
            const toUnit = document.getElementById("toUnit");
            
            fromUnit.innerHTML = toUnit.innerHTML = "";
            Object.keys(unitOptions[unitType]).forEach(unit => {
                let option1 = new Option(unit, unit);
                let option2 = new Option(unit, unit);
                fromUnit.add(option1);
                toUnit.add(option2);
            });
        }

        function convertUnit() {
            const unitType = document.getElementById("unitType").value;
            const fromUnit = document.getElementById("fromUnit").value;
            const toUnit = document.getElementById("toUnit").value;
            let value = parseFloat(document.getElementById("inputValue").value);
            if (isNaN(value)) {
                document.getElementById("result").textContent = "Please enter a valid number";
                return;
            }
            
            let result;
            if (unitType === "temperature") {
                if (fromUnit === toUnit) result = value;
                else if (fromUnit === "Celsius" && toUnit === "Fahrenheit") result = (value * 9/5) + 32;
                else if (fromUnit === "Celsius" && toUnit === "Kelvin") result = value + 273.15;
                else if (fromUnit === "Fahrenheit" && toUnit === "Celsius") result = (value - 32) * 5/9;
                else if (fromUnit === "Fahrenheit" && toUnit === "Kelvin") result = (value - 32) * 5/9 + 273.15;
                else if (fromUnit === "Kelvin" && toUnit === "Celsius") result = value - 273.15;
                else if (fromUnit === "Kelvin" && toUnit === "Fahrenheit") result = (value - 273.15) * 9/5 + 32;
            } else {
                result = value * (unitOptions[unitType][toUnit] / unitOptions[unitType][fromUnit]);
            }
            
            document.getElementById("result").textContent = `${value} ${fromUnit} = ${result.toFixed(2)} ${toUnit}`;
        }
        
        document.getElementById("unitType").addEventListener("change", populateUnits);
        populateUnits();
    </script>
</body>
</html>
