<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Resizer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 50px;
        }
        input, button {
            margin: 10px 0;
        }
        canvas {
            margin-top: 20px;
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <h1>Image Resizer</h1>
    <input type="file" id="imageInput" accept="image/*">
    <br>
    <div id="dropZone" style="border: 2px dashed gray; padding: 20px; margin: 10px auto; width: 50%; cursor: pointer;">Drag and drop an image here</div>
    <br>
    <label>Width: <input type="number" id="widthInput" placeholder="Enter width"></label>
    <label>Height: <input type="number" id="heightInput" placeholder="Enter height"></label>
    <br>
    <button onclick="resizeImage()">Resize</button>
    <br>
    <canvas id="canvas"></canvas>
    <br>
    <p>Right-click on the resized image and select "Save As" to download.</p>
    
    <script>
        const dropZone = document.getElementById("dropZone");
        const imageInput = document.getElementById("imageInput");

        dropZone.addEventListener("dragover", (e) => {
            e.preventDefault();
            dropZone.style.borderColor = "blue";
        });

        dropZone.addEventListener("dragleave", () => {
            dropZone.style.borderColor = "gray";
        });

        dropZone.addEventListener("drop", (e) => {
            e.preventDefault();
            dropZone.style.borderColor = "gray";
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith("image/")) {
                imageInput.files = e.dataTransfer.files;
            } else {
                alert("Please drop a valid image file.");
            }
        });

        function resizeImage() {
            const imageInput = document.getElementById("imageInput").files[0];
            let width = parseInt(document.getElementById("widthInput").value);
            let height = parseInt(document.getElementById("heightInput").value);
            
            if (!imageInput) {
                alert("Please select an image.");
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    if (!width || !height) {
                        alert("Please enter valid width and height.");
                        return;
                    }
                    
                    const canvas = document.getElementById("canvas");
                    const ctx = canvas.getContext("2d");
                    
                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(imageInput);
        }
    </script>
</body>
</html>
