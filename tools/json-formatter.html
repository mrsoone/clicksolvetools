<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Formatter & Validator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            max-width: 800px;
            margin: auto;
        }
        textarea {
            width: 100%;
            height: 200px;
            font-size: 14px;
            font-family: monospace;
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 10px;
        }
        button {
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            background: #2196F3;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #1976D2;
        }
        .output {
            margin-top: 20px;
            text-align: left;
            white-space: pre-wrap;
            background: #eee;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            overflow-x: auto;
        }
        .error {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>JSON Formatter & Validator</h1>
    <div class="container">
        <textarea id="jsonInput" placeholder="Paste your JSON here..."></textarea>
        <br>
        <button onclick="formatJSON()">Format & Validate</button>
        <div id="jsonOutput" class="output"></div>
    </div>
    
    <script>
        function formatJSON() {
            const input = document.getElementById("jsonInput").value;
            const output = document.getElementById("jsonOutput");
            try {
                const parsed = JSON.parse(input);
                const formatted = JSON.stringify(parsed, null, 4);
                output.innerHTML = `<pre style='white-space: pre-wrap;'>\${formatted}</pre>`;
                output.classList.remove("error");
            } catch (error) {
                output.innerHTML = `<p class='error'>Invalid JSON: ${error.message}</p>`;
                output.classList.add("error");
            }
        }
    </script>
</body>
</html>
