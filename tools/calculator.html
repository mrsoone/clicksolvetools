<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #1c1c1c, #444);
            color: white;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 400px;
            width: 90%;
            margin: auto;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        }
        input {
            width: 100%; 
            height: 60px;
            font-size: 24px;
            padding: 10px;
            border-radius: 10px;
            border: none;
            text-align: right;
            margin-bottom: 10px;
            background: #222; 
            color: #fff;
        }
        button {
            width: 22%;
            padding: 15px;
            font-size: 18px;
            margin: 5px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            background: #ff5733;
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover {
            background: #c70039;
        }
        .row {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .row.center {
            justify-content: center;
        }

        /* Responsive Styles */
        @media screen and (max-width: 600px) {
            .container {
                width: 95%;
                padding: 10px;
            }
            input {
                height: 50px;
                font-size: 20px;
            }
            button {
                width: 22%;
                padding: 12px;
                font-size: 16px;
                margin: 4px;
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/10.6.4/math.min.js"></script>
</head>
<body>
    <div class="container">
        <h1 style="white-space: nowrap; font-size: 20px;">📚 Scientific Calculator 📖</h1>
        <input type="text" id="display" oninput="handleTyping(event)">
        <div class="row">
            <button onclick="clearDisplay()">C</button>
            <button onclick="clearEntry()">CE</button>
            <button onclick="appendValue('(')">(</button>
            <button onclick="appendValue(')')">)</button>
        </div>
        <div class="row">
            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button onclick="appendValue('*')">×</button>
        </div>
        <div class="row">
            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button onclick="appendValue('-')">−</button>
        </div>
        <div class="row">
            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button onclick="appendValue('+')">+</button>
        </div>
        <div class="row">
            <button onclick="appendValue('0')">0</button>
            <button onclick="appendValue('00')">00</button>
            <button onclick="appendValue('.')">.</button>
            <button onclick="appendValue('/')">÷</button>
        </div>
        <div class="row">
            <button onclick="appendPercentage()">%</button>
            <button onclick="appendValue('exp(')">exp</button>
            <button onclick="appendValue('abs(')">|x|</button>
            <button onclick="appendFactorial()">x!</button>
        </div>
        <div class="row">
            <button onclick="appendValue('sin(')">sin</button>
            <button onclick="appendValue('cos(')">cos</button>
            <button onclick="appendValue('tan(')">tan</button>
            <button onclick="appendValue('log(')">log</button>
        </div>
        <div class="row">
            <button onclick="appendValue('sqrt(')">√</button>
            <button onclick="appendValue('^')">^</button>
            <button onclick="appendValue('pi')">π</button>
            <button onclick="appendValue('e')">e</button>
        </div>
        <div class="row center">
            <button onclick="calculateResult()" style="width: 50%;">=</button>
        </div>
    </div>
</body>
</html>
